<style>
:root {
  --onyx: #0d0d0f;
  --surface: #17171a;
  --surface2: #1e1e22;
  --line: #2d2c2a;
  --line-gold: rgba(176,141,87,0.35);
  --ivory: #ece6d9;
  --ivory-dim: #a8a196;
  --ivory-faint: #6f6a61;
  --bronze: #b08d57;
  --bronze-bright: #d4af6a;
  --oxblood: #7a3b32;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #050506; }
body { font-family: 'Inter', sans-serif; color: var(--ivory); -webkit-font-smoothing: antialiased; }
.serif { font-family: 'Cormorant Garamond', serif; }

#root { display: flex; justify-content: center; min-height: 100vh; }
.app {
  width: 100%; max-width: 480px; min-height: 100vh; background: var(--onyx);
  display: flex; flex-direction: column; position: relative;
  padding-top: env(safe-area-inset-top, 0px);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(176,141,87,0.05), transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(176,141,87,0.04), transparent 50%);
}

.header { padding: 26px 24px 6px; text-align: center; flex-shrink: 0; }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--bronze); }
.header-rule { width: 34px; height: 1px; background: var(--line-gold); margin: 10px auto 0; }
.header-date { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ivory-faint); margin-top: 10px; font-weight: 600; }

.content { flex: 1; overflow-y: auto; padding: 10px 22px 20px; }

.bottom-nav { display: flex; background: var(--surface); border-top: 1px solid var(--line); flex-shrink: 0; padding: 4px 0 calc(4px + env(safe-area-inset-bottom, 0px)); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--ivory-faint); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 10px 0 8px; transition: color 0.2s; }
.nav-btn.active { color: var(--bronze-bright); }
.nav-icon { font-size: 16px; opacity: 0.9; }

.tablet-wrap { position: relative; margin: 10px 0 18px; }
.tablet {
  position: relative; border-radius: 3px; padding: 44px 26px 30px;
  overflow: hidden;
  background:
    radial-gradient(circle at 15% 8%, rgba(255,255,255,0.025), transparent 40%),
    linear-gradient(155deg, #1b1a18, #131211 60%);
  border: 1px solid var(--line-gold);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 24px 50px -20px rgba(0,0,0,0.7);
  min-height: 280px; display: flex; flex-direction: column;
  animation: tablet-in 0.5s cubic-bezier(.2,.8,.2,1);
}
@keyframes tablet-in { 0% { opacity: 0; transform: translateY(8px) scale(0.985); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

.tablet::before {
  content: ''; position: absolute; inset: -6%; pointer-events: none; z-index: 0;
  background:
    radial-gradient(circle at 22% 18%, rgba(212,175,106,0.05), transparent 46%),
    radial-gradient(circle at 78% 82%, rgba(212,175,106,0.035), transparent 50%);
  animation: kenburns 46s ease-in-out infinite alternate;
  transform-origin: 50% 50%;
}
@keyframes kenburns {
  0%   { transform: scale(1) translate(0%, 0%); }
  100% { transform: scale(1.06) translate(-1.5%, 1%); }
}
.tablet > * { position: relative; z-index: 1; }

.tablet::after {
  content: ''; position: absolute; width: 13px; height: 13px; border: 1px solid var(--line-gold);
  bottom: 10px; right: 10px; border-left: none; border-top: none; z-index: 2;
}
.tablet-corner-tl {
  content: ''; position: absolute; width: 13px; height: 13px; border: 1px solid var(--line-gold);
  top: 10px; left: 10px; border-right: none; border-bottom: none; z-index: 2; pointer-events: none;
}
.tablet-quote-mark { font-family: 'Cormorant Garamond', serif; font-size: 46px; color: var(--bronze); opacity: 0.55; line-height: 0.5; height: 30px; }
.tablet-quote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: 25px; line-height: 1.44; color: var(--ivory); flex: 1; }
.tablet-footer { display: flex; align-items: center; gap: 12px; margin-top: 26px; }
.tablet-rule { flex: 1; height: 1px; background: var(--line-gold); }
.tablet-author { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bronze); font-weight: 700; white-space: nowrap; }
.tablet-cat { position: absolute; top: 16px; right: 20px; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ivory-faint); font-weight: 700; cursor: pointer; padding: 5px 9px; border-radius: 20px; border: 1px solid transparent; transition: all 0.15s; z-index: 2; }
.tablet-cat:hover { color: var(--bronze-bright); border-color: var(--line-gold); }
.tablet-cat.locked { color: var(--bronze-bright); border-color: var(--bronze); background: rgba(176,141,87,0.12); }

.streak-border { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
.streak-border rect {
  fill: none; stroke: var(--bronze-bright);
  transition: stroke-dashoffset 1s ease, stroke-width 0.6s ease, opacity 0.6s ease;
  vector-effect: non-scaling-stroke;
}

@media (max-width: 360px) {
  .content { padding: 10px 16px 20px; }
  .tablet { padding: 38px 18px 24px; min-height: 250px; }
  .tablet-quote { font-size: 21px; }
  .tablet-cat { right: 16px; }
  .action-btn { width: 42px; height: 42px; font-size: 15px; }
  .action-btn.big { width: 48px; height: 48px; font-size: 17px; }
}

.action-row { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }
.action-btn {
  width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line);
  background: var(--surface); color: var(--ivory-dim); font-size: 16px; display: flex;
  align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s;
}
.action-btn:hover { border-color: var(--line-gold); color: var(--ivory); transform: translateY(-1px); }
.action-btn.active { border-color: var(--bronze); color: var(--bronze-bright); background: rgba(176,141,87,0.1); }
.action-btn.big { width: 54px; height: 54px; font-size: 19px; }

.browse-row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 4px; }
.browse-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ivory-faint); font-weight: 700; }

.lock-banner { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bronze-bright); font-weight: 700; }
.lock-banner span.clear { color: var(--ivory-faint); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

.reflect-wrap { margin-top: 16px; animation: bz-fade-in 0.25s ease; }
@keyframes bz-fade-in { from { opacity: 0; } to { opacity: 1; } }
.reflect-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bronze); font-weight: 700; margin-bottom: 8px; }
.reflect-box {
  width: 100%; min-height: 90px; background: var(--surface); border: 1px solid var(--line);
  border-radius: 6px; padding: 14px; color: var(--ivory); font-family: 'Inter', sans-serif; font-size: 16px;
  line-height: 1.6; resize: vertical; outline: none;
}
.reflect-box:focus { border-color: var(--line-gold); }
.reflect-box::placeholder { color: var(--ivory-faint); }

.saved-item { padding: 18px 0; border-bottom: 1px solid var(--line); }
.saved-item:last-child { border-bottom: none; }
.saved-quote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: var(--ivory); line-height: 1.4; }
.saved-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.saved-author { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bronze); font-weight: 700; }
.saved-remove { background: none; border: none; color: var(--ivory-faint); font-size: 12px; cursor: pointer; }

.empty { text-align: center; padding: 60px 20px; color: var(--ivory-faint); }
.empty-glyph { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--bronze); opacity: 0.5; margin-bottom: 14px; }
.empty-text { font-size: 13px; line-height: 1.7; }

.chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.chip { padding: 7px 13px; border-radius: 20px; border: 1px solid var(--line); font-size: 11px; font-weight: 700; letter-spacing: 0.03em; color: var(--ivory-dim); cursor: pointer; background: var(--surface); transition: all 0.15s; }
.chip.active { border-color: var(--bronze); color: var(--bronze-bright); background: rgba(176,141,87,0.1); }

.section-title { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ivory-faint); font-weight: 700; margin-bottom: 14px; }

.settings-card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
.settings-label { color: var(--ivory-dim); }
.settings-val { color: var(--bronze-bright); font-weight: 700; }
.btn-outline { width: 100%; padding: 13px; border-radius: 8px; background: none; border: 1px solid rgba(122,59,50,0.4); color: #c97a6c; font-size: 12.5px; font-weight: 700; cursor: pointer; }
</style>

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / 86400000);
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function addDaysStr(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function loadJSON(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch(e) { return fallback; }
}

function useSwipeHandlers(onNext, onPrev) {
  const startRef = React.useRef({ x: 0, y: 0 });
  const onTouchStart = (ev) => {
    const t = ev.touches[0];
    startRef.current = { x: t.clientX, y: t.clientY };
  };
  const onTouchEnd = (ev) => {
    const t = ev.changedTouches[0];
    const dx = t.clientX - startRef.current.x;
    const dy = t.clientY - startRef.current.y;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if (dx < 0) onNext(); else onPrev();
  };
  return { onTouchStart: onTouchStart, onTouchEnd: onTouchEnd };
}

function computeStreak(visitDays) {
  const set = new Set(visitDays);
  const today = todayStr();
  let cursor = set.has(today) ? today : addDaysStr(today, -1);
  if (!set.has(cursor)) return 0;
  let count = 0;
  let safety = 0;
  while (set.has(cursor) && safety < 2000) {
    count++;
    cursor = addDaysStr(cursor, -1);
    safety++;
  }
  return count;
}

const STREAK_CAP = 45;
const STREAK_CAP_DISPLAY = 45;

function EngravedBorder(props) {
  const streak = props.streak;
  const progress = Math.max(0, Math.min(1, streak / STREAK_CAP));
  const w = 400, h = 300, r = 6, m = 3;
  const perim = 2 * (w - 2 * m) + 2 * (h - 2 * m) - 8 * r + 2 * Math.PI * r;
  const dashOffset = perim * (1 - progress);
  const strokeWidth = 0.6 + progress * 1.8;
  const opacity = 0.16 + progress * 0.6;
  return e("svg", { className: "streak-border", viewBox: "0 0 " + w + " " + h, preserveAspectRatio: "none", "aria-hidden": "true" },
    e("rect", {
      x: m, y: m, width: w - 2 * m, height: h - 2 * m, rx: r, ry: r,
      strokeWidth: strokeWidth,
      strokeDasharray: perim,
      strokeDashoffset: dashOffset,
      style: { opacity: opacity }
    })
  );
}

  const items = allQuotes.filter(function (q) { return savedIds.includes(q.id); });

  const submitCustom = function () {
    if (!draftText.trim()) return;
    onAddCustom(draftText, draftAuthor);
    setDraftText(""); setDraftAuthor(""); setShowAdd(false);
  };

  if (items.length === 0 && !showAdd) {
    return e("div", null,
      e("div", { className: "empty" },
        e("div", { className: "empty-glyph" }, "\u2616"),
        e("div", { className: "empty-text" }, "Nothing kept yet.", e("br"), "Save a quote from Today, or add one of your own.")
      ),
      e("button", { className: "btn-outline", style: { borderColor: "var(--line-gold)", color: "var(--bronze-bright)" }, onClick: function () { setShowAdd(true); } }, "+ Add your own quote")
    );
  }

  const safeIndex = ((cycleIndex % items.length) + items.length) % items.length;
  const cycleQuote = items[safeIndex];

  return e("div", null,
    e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
      e("div", { className: "section-title", style: { marginBottom: 0 } }, items.length + " Kept"),
      e("div", { className: "chip-row", style: { marginBottom: 0 } },
        e("div", { className: "chip" + (mode === "list" ? " active" : ""), onClick: function () { setMode("list"); } }, "List"),
        e("div", { className: "chip" + (mode === "cycle" ? " active" : ""), onClick: function () { setMode("cycle"); setCycleIndex(0); } }, "Cycle")
      )
    ),
    (mode === "cycle" && items.length > 0) ? e("div", null,
      e("div", Object.assign({ className: "tablet-wrap" }, cycleSwipe),
        e("div", { className: "tablet", key: cycleQuote.id },
          e("div", { className: "tablet-cat" }, cycleQuote.cat),
          e("div", { className: "tablet-quote-mark" }, "\u201C"),
          e("div", { className: "tablet-quote" }, cycleQuote.text),
          e("div", { className: "tablet-footer" },
            e("div", { className: "tablet-rule" }),
            e("div", { className: "tablet-author" }, cycleQuote.author)
          )
        )
      ),
      e("div", { className: "action-row" },
        e("div", { className: "action-btn", onClick: function () { setCycleIndex(function (i) { return i - 1; }); } }, "\u2190"),
        e("div", { className: "action-btn active", onClick: function () { onRemove(cycleQuote.id); }, title: "Remove from saved" }, "\u2605"),
        e("div", { className: "action-btn", onClick: function () { setCycleIndex(function (i) { return i + 1; }); } }, "\u2192")
      ),
      e("div", { className: "reflect-wrap" },
        e("div", { className: "reflect-label" }, "Your reflection"),
        e("textarea", {
          className: "reflect-box", placeholder: "What does this mean for you today?",
          value: reflections[cycleQuote.id] || "", onChange: function (ev) { onReflect(cycleQuote.id, ev.target.value); }
        })
      )
    ) : null,
    (mode === "list") ? items.map(function (q) {
      return e("div", { className: "saved-item", key: q.id },
        e("div", { className: "saved-quote" }, "\u201C" + q.text + "\u201D"),
        e("div", { className: "saved-meta" },
          e("span", { className: "saved-author" }, q.author + " \u00B7 " + q.cat),
          e("button", { className: "saved-remove", onClick: function () { customIds.includes(q.id) ? onRemoveCustom(q.id) : onRemove(q.id); } },
            customIds.includes(q.id) ? "Delete" : "Remove")
        ),
        reflections[q.id] ? e("div", { style: { marginTop: 10, fontSize: 12.5, color: "var(--ivory-dim)", lineHeight: 1.6, fontStyle: "italic" } },
          "\u2014 " + reflections[q.id]) : null
      );
    }) : null,
    (mode === "list") ? (
      showAdd ? e("div", { className: "settings-card", style: { marginTop: 14 } },
        e("div", { className: "reflect-label" }, "Your quote"),
        e("textarea", { className: "reflect-box", style: { minHeight: 70, marginBottom: 12 }, placeholder: "Type the quote or idea...", value: draftText, onChange: function (ev) { setDraftText(ev.target.value); } }),
        e("div", { className: "reflect-label" }, "Author (optional)"),
        e("input", { className: "reflect-box", style: { minHeight: 0, padding: "12px 14px" }, placeholder: "e.g. You, or who said it", value: draftAuthor, onChange: function (ev) { setDraftAuthor(ev.target.value); } }),
        e("div", { style: { display: "flex", gap: 10, marginTop: 14 } },
          e("button", { className: "btn-outline", style: { borderColor: "var(--line)", color: "var(--ivory-dim)" }, onClick: function () { setShowAdd(false); setDraftText(""); setDraftAuthor(""); } }, "Cancel"),
          e("button", { className: "btn-outline", style: { borderColor: "var(--line-gold)", color: "var(--bronze-bright)" }, onClick: submitCustom }, "Save quote")
        )
      ) : e("button", { className: "btn-outline", style: { borderColor: "var(--line-gold)", color: "var(--bronze-bright)", marginTop: 6 }, onClick: function () { setShowAdd(true); } }, "+ Add your own quote")
    ) : null
  );
}

function SettingsView(props) {
  const visitDays = props.visitDays, savedCount = props.savedCount, libSize = props.libSize,
    streak = props.streak, onReset = props.onReset;
  return e("div", null,
    e("div", { className: "settings-card" },
      e("div", { className: "settings-row" }, e("span", { className: "settings-label" }, "Days returned"), e("span", { className: "settings-val" }, visitDays.length)),
      e("div", { className: "settings-row" }, e("span", { className: "settings-label" }, "Current run"), e("span", { className: "settings-val" }, streak >= STREAK_CAP_DISPLAY ? "Fully engraved" : (streak + (streak === 1 ? " day" : " days")))),
      e("div", { className: "settings-row" }, e("span", { className: "settings-label" }, "Quotes kept"), e("span", { className: "settings-val" }, savedCount)),
      e("div", { className: "settings-row" }, e("span", { className: "settings-label" }, "Library size"), e("span", { className: "settings-val" }, libSize))
    ),
    e("div", { className: "settings-card" },
      e("div", { style: { fontSize: 12.5, color: "var(--ivory-dim)", lineHeight: 1.7 } },
        "Anchor gives you one fixed quote each day \u2014 the same one on every device, all day \u2014 so it works as a single point of focus rather than something to scroll past. The line etched around the tablet is your quiet record of returning: no counter, no pressure, just a border that slowly fills in. Tap a category tag to browse only within it for a while. Add your own quotes from the Saved tab to cycle through alongside the library."
      )
    ),
    e("button", { className: "btn-outline", onClick: onReset }, "Clear Saved & Reflections")
  );
}

function App() {
  const [tab, setTab] = useState("today");
  const [savedIds, setSavedIds] = useState(function () { return loadJSON("anchor_saved", []); });
  const [reflections, setReflections] = useState(function () { return loadJSON("anchor_reflections", {}); });
  const [visitDays, setVisitDays] = useState(function () { return loadJSON("anchor_visits", []); });
  const [customQuotes, setCustomQuotes] = useState(function () { return loadJSON("anchor_custom", []); });
  const [lockedCategory, setLockedCategory] = useState(null);

  useEffect(function () { localStorage.setItem("anchor_saved", JSON.stringify(savedIds)); }, [savedIds]);
  useEffect(function () { localStorage.setItem("anchor_reflections", JSON.stringify(reflections)); }, [reflections]);
  useEffect(function () { localStorage.setItem("anchor_custom", JSON.stringify(customQuotes)); }, [customQuotes]);
  useEffect(function () {
    const t = todayStr();
    if (!visitDays.includes(t)) {
      const next = visitDays.concat([t]);
      setVisitDays(next);
      localStorage.setItem("anchor_visits", JSON.stringify(next));
    }
  }, []);

  const allQuotes = useMemo(function () { return QUOTES.concat(customQuotes); }, [customQuotes]);
  const streak = useMemo(function () { return computeStreak(visitDays); }, [visitDays]);

  const todayIndex = dayOfYear(new Date()) % allQuotes.length;
  const [browseOffset, setBrowseOffset] = useState(0);

  const activePool = useMemo(function () {
    if (!lockedCategory) return allQuotes;
    const filtered = allQuotes.filter(function (q) { return q.cat === lockedCategory; });
    return filtered.length ? filtered : allQuotes;
  }, [allQuotes, lockedCategory]);

  const baseIndex = lockedCategory ? (dayOfYear(new Date()) % activePool.length) : todayIndex;
  const activeIndex = (baseIndex + browseOffset + activePool.length * 1000) % activePool.length;
  const quote = activePool[activeIndex];

  const toggleLockCategory = function (cat) {
    setBrowseOffset(0);
    setLockedCategory(function (prev) { return prev === cat ? null : cat; });
  };

  const toggleSave = function (id) { setSavedIds(function (prev) { return prev.includes(id) ? prev.filter(function (x) { return x !== id; }) : prev.concat([id]); }); };
  const setReflection = function (id, text) { setReflections(function (prev) { const next = Object.assign({}, prev); next[id] = text; return next; }); };
  const addCustomQuote = function (text, author) {
    const id = Date.now();
    const q = { id: id, text: text.trim(), author: author.trim() || "You", cat: "Personal" };
    setCustomQuotes(function (prev) { return prev.concat([q]); });
    setSavedIds(function (prev) { return prev.concat([id]); });
    return id;
  };
  const removeCustomQuote = function (id) {
    setCustomQuotes(function (prev) { return prev.filter(function (q) { return q.id !== id; }); });
    setSavedIds(function (prev) { return prev.filter(function (x) { return x !== id; }); });
  };

  const dateLabel = new Date().toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });

  return e("div", { className: "app" },
    e("div", { className: "header" },
      e("div", { className: "header-title" }, "Anchor"),
      e("div", { className: "header-rule" }),
      tab === "today" ? e("div", { className: "header-date" }, dateLabel) : null
    ),
    e("div", { className: "content" },
      tab === "today" ? e(TodayView, {
        quote: quote, isToday: browseOffset === 0, streak: streak,
        lockedCategory: lockedCategory, onToggleLock: toggleLockCategory,
        onPrev: function () { setBrowseOffset(function (o) { return o - 1; }); },
        onNext: function () { setBrowseOffset(function (o) { return o + 1; }); },
        onReturnToToday: function () { setBrowseOffset(0); },
        isSaved: savedIds.includes(quote.id), onToggleSave: function () { toggleSave(quote.id); },
        reflection: reflections[quote.id] || "", onReflect: function (t) { setReflection(quote.id, t); }
      }) : null,
      tab === "saved" ? e(SavedView, {
        allQuotes: allQuotes, savedIds: savedIds, onRemove: toggleSave, reflections: reflections,
        onReflect: setReflection, customIds: customQuotes.map(function (q) { return q.id; }),
        onAddCustom: addCustomQuote, onRemoveCustom: removeCustomQuote
      }) : null,
      tab === "settings" ? e(SettingsView, {
        visitDays: visitDays, savedCount: savedIds.length, libSize: allQuotes.length, streak: streak,
        onReset: function () {
          if (confirm("Clear all saved quotes, custom quotes, and reflections? This can't be undone.")) {
            setSavedIds([]); setReflections({}); setCustomQuotes([]);
          }
        }
      }) : null
    ),
    e("div", { className: "bottom-nav" },
      e("button", { className: "nav-btn " + (tab === "today" ? "active" : ""), onClick: function () { setTab("today"); } },
        e("span", { className: "nav-icon" }, "\u25C8"), "Today"),
      e("button", { className: "nav-btn " + (tab === "saved" ? "active" : ""), onClick: function () { setTab("saved"); } },
        e("span", { className: "nav-icon" }, "\u2616"), "Saved"),
      e("button", { className: "nav-btn " + (tab === "settings" ? "active" : ""), onClick: function () { setTab("settings"); } },
        e("span", { className: "nav-icon" }, "\u2699"), "Settings")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
